---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Renovate"

on:
  repository_dispatch:
    types: [Renovate]
  schedule:
    - cron: "0 * * * *"
  push:
    branches: ["main"]
    paths:
      - .github/renovate.json5
      - "**/**.json"
      - "**/**.json5"
  workflow_dispatch:
    inputs:
      distinct_id:
        description: ""
      dryRun:
        description: Dry Run
        type: boolean
        default: false
        required: false
      logLevel:
        description: Renovate log level
        type: choice
        options:
          - trace
          - debug
          - info
          - warn
          - error
        default: info
      version:
        description: Renovate version
        type: string
        default: latest
        required: false
      repo:
        description: Specify Repo
        type: string
        default: ""
        required: false
      cache:
        description: Use Renovate cache from GitHub repo's cache?
        type: choice
        default: "enabled"
        options:
          - enabled
          - disabled
          - reset

# concurrency:
#   group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
#   cancel-in-progress: true

# Retrieve BOT_USER_ID via `curl -s "https://api.github.com/users/${BOT_USERNAME}%5Bbot%5D" | jq .id`
env:
  RENOVATE_VERSION: latest
  RENOVATE_PLATFORM: github
  RENOVATE_PLATFORM_COMMIT: true
  RENOVATE_ONBOARDING_CONFIG_FILE_NAME: .github/renovate.json5
  RENOVATE_AUTODISCOVER: true
  INCLUDE_ARCHIVED: false
  RENOVATE_TOPIC: "renovate-enabled"
  DOCKER_CMD_TOPIC: "nix"

jobs:
  generate-matrix:
    name: Generate Repo Matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      repos: ${{ steps.repo.outputs.repos }}
    steps:
      - name: echo distinct ID ${{ github.event.inputs.distinct_id }}
        run: echo ${GITHUB_EVENT_INPUTS_DISTINCT_ID}
        env:
          GITHUB_EVENT_INPUTS_DISTINCT_ID: ${{ github.event.inputs.distinct_id }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Repo List
        id: repo
        shell: bash
        env:
          LIST_REPOS_PAT: ${{ secrets.LIST_REPOS_PAT }}
          INPUTS_REPO: ${{ inputs.repo }}
          GITHUB_EVENT_CLIENT_PAYLOAD_REPO: ${{ github.event.client_payload.repo }}
          OWNER: ${{ github.repository_owner }}
          RENOVATE_TOPIC: ${{ env.RENOVATE_TOPIC }}
          DOCKER_CMD_TOPIC: ${{ env.DOCKER_CMD_TOPIC }}
          INCLUDE_ARCHIVED: ${{ env.INCLUDE_ARCHIVED }}
        run: .github/scripts/get-repos.sh >> $GITHUB_OUTPUT

      - name: show output
        env:
          STEPS_REPO_OUTPUTS_REPOS: ${{ steps.repo.outputs.repos }}
        run: |
          echo "## 📦 Repository Matrix" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          REPO_COUNT=$(echo "${STEPS_REPO_OUTPUTS_REPOS}" | jq 'length')
          echo "> Running Renovate on **${REPO_COUNT}** repositor$([[ ${REPO_COUNT} -eq 1 ]] && echo "y" || echo "ies")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| # | Repository | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|---|------------|------|" >> $GITHUB_STEP_SUMMARY

          echo "${STEPS_REPO_OUTPUTS_REPOS}" | jq -r \
            'to_entries[] | "| \(.key + 1) | `\(.value.name)` | \(if .value.nix then "`nix`" else "" end) |"' >> $GITHUB_STEP_SUMMARY

  renovate:
    name: "${{ matrix.repo.nix == true && format('Renovate: {0} (nix)', matrix.repo.name) || format('Renovate: {0}', matrix.repo.name) }}"
    needs: [generate-matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.generate-matrix.outputs.repos) }}
    env:
      RENOVATE_AUTODISCOVER_FILTER: "${{ github.repository_owner }}/${{ matrix.repo.name }}"
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
          owner: "${{ github.repository_owner }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: "${{ steps.app-token.outputs.token }}"
          persist-credentials: true

      - name: Renovate Cache
        id: renovate-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        if: inputs.cache != 'disabled'
        continue-on-error: true
        with:
          path: /tmp/renovate/cache/renovate/repository
          key: renovate-cache-${{ matrix.repo.name }}-${{ github.run_id }}
          restore-keys: |
            renovate-cache-${{ matrix.repo.name }}

      - name: Set cache folder permissions
        shell: bash
        run: |
          # chown /tmp/renovate due to cache permissions
          # UID from https://github.com/renovatebot/renovate/blob/9c999fb13e8746830a0c163bad9c244b0b926c6a/tools/docker/Dockerfile#L114
          mkdir -p /tmp/renovate
          sudo chown -R 12021:$(id -g) /tmp/renovate

      - name: Set Docker Cmd File Variables
        id: docker-cmd
        shell: bash
        run: |
          if [ "${{ matrix.repo.nix }}" = "true" ]; then
            echo "docker-cmd-file=.github/scripts/renovate-entrypoint.sh" >> $GITHUB_OUTPUT
            echo "docker-user=root" >> $GITHUB_OUTPUT
          else
            echo "docker-cmd-file=" >> $GITHUB_OUTPUT
            echo "docker-user=" >> $GITHUB_OUTPUT
          fi

      - name: Renovate
        uses: renovatebot/github-action@b67590ea780158ccd13192c22a3655a5231f869d # v46.1.8
        env:
          RENOVATE_REPOSITORY_CACHE: ${{ inputs.cache }}
          LOG_LEVEL: ${{ inputs.logLevel }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun }}
        with:
          configurationFile: "${{ env.RENOVATE_ONBOARDING_CONFIG_FILE_NAME }}"
          token: "${{ steps.app-token.outputs.token }}"
          renovate-version: "${{ inputs.version || env.RENOVATE_VERSION }}"
          docker-volumes: /tmp:/tmp
          docker-cmd-file: "${{ steps.docker-cmd.outputs.docker-cmd-file }}"
          docker-user: "${{ steps.docker-cmd.outputs.docker-user }}"
