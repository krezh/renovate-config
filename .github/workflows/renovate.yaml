---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Renovate"

on:
  repository_dispatch:
    types: [Renovate]
  schedule:
    - cron: "0 * * * *"
  push:
    branches: ["main"]
    paths:
      - .github/renovate.json5
      - "**/**.json"
      - "**/**.json5"
  workflow_dispatch:
    inputs:
      distinct_id:
        description: ""
      dryRun:
        description: Dry Run
        type: boolean
        default: false
        required: false
      logLevel:
        description: Renovate log level
        type: choice
        options:
          - trace
          - debug
          - info
          - warn
          - error
        default: info
      version:
        description: Renovate version
        type: string
        default: latest
        required: false
      repo:
        description: Specify Repo
        type: string
        default: ""
        required: false
      cache:
        description: Use Renovate cache from GitHub repo's cache?
        type: choice
        default: "enabled"
        options:
          - enabled
          - disabled
          - reset

# concurrency:
#   group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
#   cancel-in-progress: true

# Retrieve BOT_USER_ID via `curl -s "https://api.github.com/users/${BOT_USERNAME}%5Bbot%5D" | jq .id`
env:
  RENOVATE_VERSION: latest
  RENOVATE_PLATFORM: github
  RENOVATE_PLATFORM_COMMIT: true
  RENOVATE_ONBOARDING_CONFIG_FILE_NAME: .github/renovate.json5
  RENOVATE_AUTODISCOVER: true
  INCLUDE_ARCHIVED: false
  RENOVATE_TOPIC: "renovate-enabled"
  DOCKER_CMD_TOPIC: "nix"

jobs:
  generate-matrix:
    name: Generate Repo Matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      repos: ${{ steps.repo.outputs.repos }}
      nix-repos: ${{ steps.repo.outputs.nix-repos }}
    steps:
      - name: echo distinct ID ${{ github.event.inputs.distinct_id }}
        run: echo ${GITHUB_EVENT_INPUTS_DISTINCT_ID}
        env:
          GITHUB_EVENT_INPUTS_DISTINCT_ID: ${{ github.event.inputs.distinct_id }}

      - name: Get Repo List
        id: repo
        shell: bash
        run: |
          if [ -z "${INPUTS_REPO}" ] && [ -z "${GITHUB_EVENT_CLIENT_PAYLOAD_REPO}" ]; then
            RESPONSE=$(curl -SsL -H "Accept: application/vnd.github.mercy-preview+json" \
              -H "Authorization: Bearer ${{ secrets.LIST_REPOS_PAT }}" \
              "https://api.github.com/search/repositories?q=user:${{ github.repository_owner }}+topic:${{ env.RENOVATE_TOPIC }}")
            echo "repos=$(echo "${RESPONSE}" | jq -c '[.items[] | select(.archived == ${{ env.INCLUDE_ARCHIVED }} and .visibility == "public") | .name]')" >> $GITHUB_OUTPUT
            echo "nix-repos=$(echo "${RESPONSE}" | jq -c '[.items[] | select(.archived == ${{ env.INCLUDE_ARCHIVED }} and .visibility == "public" and (.topics | contains(["${{ env.DOCKER_CMD_TOPIC }}"]))) | .name]')" >> $GITHUB_OUTPUT
          elif [ -n "${INPUTS_REPO}" ]; then
            echo "repos=[\"${INPUTS_REPO}\"]" >> $GITHUB_OUTPUT
            echo "nix-repos=[]" >> $GITHUB_OUTPUT
          elif [ -n "${GITHUB_EVENT_CLIENT_PAYLOAD_REPO}" ]; then
            echo "repos=[\"${GITHUB_EVENT_CLIENT_PAYLOAD_REPO}\"]" >> $GITHUB_OUTPUT
            echo "nix-repos=[]" >> $GITHUB_OUTPUT
          fi
        env:
          INPUTS_REPO: ${{ inputs.repo }}
          GITHUB_EVENT_CLIENT_PAYLOAD_REPO: ${{ github.event.client_payload.repo }}

      - name: show output
        run: |
          echo "## 📦 Repository Matrix" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          REPO_COUNT=$(echo "${STEPS_REPO_OUTPUTS_REPOS}" | jq 'length')
          echo "> Running Renovate on **${REPO_COUNT}** repositor$([[ ${REPO_COUNT} -eq 1 ]] && echo "y" || echo "ies")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| # | Repository | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|---|------------|------|" >> $GITHUB_STEP_SUMMARY

          echo "${STEPS_REPO_OUTPUTS_REPOS}" | jq -r --argjson nix "${NIX_REPOS_OUTPUT:-[]}" \
            'to_entries[] | .value as $repo | "| \(.key + 1) | `\($repo)` | \(if ($nix | contains([$repo])) then "`nix`" else "" end) |"' >> $GITHUB_STEP_SUMMARY
        env:
          STEPS_REPO_OUTPUTS_REPOS: ${{ steps.repo.outputs.repos }}
          NIX_REPOS_OUTPUT: ${{ steps.repo.outputs.nix-repos }}

  renovate:
    name: Renovate
    needs: [generate-matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.generate-matrix.outputs.repos) }}
    env:
      RENOVATE_AUTODISCOVER_FILTER: "${{ github.repository_owner }}/${{ matrix.repo }}"
      NIX_REPOS: ${{ needs.generate-matrix.outputs.nix-repos }}
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
          owner: "${{ github.repository_owner }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: "${{ steps.app-token.outputs.token }}"
          persist-credentials: true

      - name: Renovate Cache
        id: renovate-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        if: inputs.cache != 'disabled'
        continue-on-error: true
        with:
          path: /tmp/renovate/cache/renovate/repository
          key: renovate-cache-${{ matrix.repo }}-${{ github.run_id }}
          restore-keys: |
            renovate-cache-${{ matrix.repo }}

      - name: Set cache folder permissions
        shell: bash
        run: |
          # chown /tmp/renovate due to cache permissions
          # UID from https://github.com/renovatebot/renovate/blob/9c999fb13e8746830a0c163bad9c244b0b926c6a/tools/docker/Dockerfile#L114
          mkdir -p /tmp/renovate
          sudo chown -R 12021:$(id -g) /tmp/renovate

      - name: Set Docker Cmd File Variables
        id: docker-cmd
        shell: bash
        env:
          MATRIX_REPO: ${{ matrix.repo }}
        run: |
          if echo "${NIX_REPOS:-[]}" | jq -e --arg repo "${MATRIX_REPO}" 'index($repo) != null' > /dev/null; then
            echo "docker-cmd-file=.github/scripts/renovate-entrypoint.sh" >> $GITHUB_OUTPUT
            echo "docker-user=root" >> $GITHUB_OUTPUT
          else
            echo "docker-cmd-file=" >> $GITHUB_OUTPUT
            echo "docker-user=" >> $GITHUB_OUTPUT
          fi

      - name: Renovate
        uses: renovatebot/github-action@3633cede7d4d4598438e654eac4a695e46004420 # v46.1.7
        env:
          RENOVATE_REPOSITORY_CACHE: ${{ inputs.cache }}
          LOG_LEVEL: ${{ inputs.logLevel }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun }}
        with:
          configurationFile: "${{ env.RENOVATE_ONBOARDING_CONFIG_FILE_NAME }}"
          token: "${{ steps.app-token.outputs.token }}"
          renovate-version: "${{ inputs.version || env.RENOVATE_VERSION }}"
          docker-volumes: /tmp:/tmp
          docker-cmd-file: "${{ steps.docker-cmd.outputs.docker-cmd-file }}"
          docker-user: "${{ steps.docker-cmd.outputs.docker-user }}"
